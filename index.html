const SESSION_KEY = "ket_session_v2";

// ── Firebase 数据库操作封装 ──────────────────────────────
async function dbRead(path) {
  try {
    const snap = await window._fbGet(window._fbRef(window._fbDb, path));
    return snap.exists() ? snap.val() : null;
  } catch(e) { console.error("dbRead error", e); return null; }
}
async function dbWrite(path, data) {
  try {
    await window._fbSet(window._fbRef(window._fbDb, path), data);
    return true;
  } catch(e) { console.error("dbWrite error", e); return false; }
}
async function dbPatch(path, data) {
  try {
    await window._fbUpdate(window._fbRef(window._fbDb, path), data);
    return true;
  } catch(e) { console.error("dbPatch error", e); return false; }
}

function getSession() {
  try { const r = sessionStorage.getItem(SESSION_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function setSession(data) { try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(data)); } catch {} }
function clearSession() { try { sessionStorage.removeItem(SESSION_KEY); } catch {} }

function encPwd(s) { try { return btoa(unescape(encodeURIComponent(s))); } catch { return btoa(s); } }

function makeProgress(planDays) {
  const today = new Date().toISOString().split("T")[0];
  const tp = {};
  GRAMMAR_TOPICS.forEach(t => { tp[t.id] = { learned:false, quizScore:0, reviewCount:0, nextReview:null, lastReview:null, intervalIdx:0 }; });
  return { planDays, startDate:today, topicProgress:tp, xp:0 };
}

// ── Root App ─────────────────────────────────────────────
function App() {
  const [fbReady, setFbReady] = useState(!!window._fbReady);
  const [boot, setBoot]       = useState(true);
  const [user, setUser]       = useState(null);
  const [authMode, setAuthMode] = useState("login");

  useEffect(() => {
    const onReady = async () => {
      setFbReady(true);
      const sess = getSession();
      if (sess) {
        const u = await dbRead(`users/${sess.username}`);
        if (u && u.active !== false) {
          setUser({ username: sess.username, ...u });
        } else {
          clearSession();
        }
      }
      setBoot(false);
    };
    if (window._fbReady) { onReady(); }
    else { window.addEventListener("firebase-ready", onReady); }
    return () => window.removeEventListener("firebase-ready", onReady);
  }, []);

  const login = (u) => { setUser(u); setSession({ username: u.username }); };
  const logout = () => { clearSession(); setUser(null); setAuthMode("login"); };

  if (!fbReady || boot) return <Splash text={!fbReady ? "连接云端数据库…" : "启动中…"} />;
  if (!user) return <AuthScreen mode={authMode} setMode={setAuthMode} onLogin={login} />;
  if (user.role === "admin") return <AdminApp user={user} onLogout={logout} />;
  return <StudentApp user={user} onLogout={logout} />;
}

// ── Auth Screen ──────────────────────────────────────────
function AuthScreen({ mode, setMode, onLogin }) {
  const isLogin = mode === "login";
  const [username, setUsername]   = useState("");
  const [password, setPassword]   = useState("");
  const [name, setName]           = useState("");
  const [planDays, setPlanDays]   = useState(30);
  const [inviteCode, setInviteCode] = useState("");
  const [error, setError]         = useState("");
  const [busy, setBusy]           = useState(false);

  const submit = async () => {
    const uname = username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
    if (!uname || !password) { setError("请填写用户名和密码"); return; }
    if (!isLogin && !name.trim()) { setError("请填写姓名"); return; }
    if (!isLogin && uname.length < 3) { setError("用户名至少3个字符（英文/数字）"); return; }
    if (!isLogin && password.length < 4) { setError("密码至少4位"); return; }
    setBusy(true); setError("");

    if (isLogin) {
      const u = await dbRead(`users/${uname}`);
      if (!u) { setError("账号不存在"); setBusy(false); return; }
      if (u.active === false) { setError("账号已停用，请联系管理员"); setBusy(false); return; }
      if (u.password !== encPwd(password)) { setError("密码错误"); setBusy(false); return; }
      await dbPatch(`users/${uname}`, { lastLogin: new Date().toISOString() });
      onLogin({ username: uname, ...u });
    } else {
      const existing = await dbRead(`users/${uname}`);
      if (existing) { setError("用户名已被注册，请换一个"); setBusy(false); return; }
      // 检查是否第一个用户
      const allUsers = await dbRead("users");
      const isFirst = !allUsers || Object.keys(allUsers).length === 0;
      // 邀请码验证（第一个用户=管理员，免验证）
      if (!isFirst) {
        const settings = await dbRead("settings") || {};
        const validCodes = (settings.inviteCodes || ["KET2024"]).map(c=>c.trim().toUpperCase());
        if (!validCodes.includes(inviteCode.trim().toUpperCase())) {
          setError("邀请码错误，请联系管理员获取");
          setBusy(false); return;
        }
      }
      const newUser = {
        displayName: name.trim(),
        password: encPwd(password),
        role: isFirst ? "admin" : "student",
        active: true,
        createdAt: new Date().toISOString(),
        lastLogin: new Date().toISOString(),
        progress: isFirst ? null : makeProgress(planDays),
      };
      await dbWrite(`users/${uname}`, newUser);
      // 初始化默认邀请码
      if (isFirst) {
        await dbWrite("settings", { inviteCodes: ["KET2024"] });
      }
      onLogin({ username: uname, ...newUser });
    }
    setBusy(false);
  };

  return (
    <div style={S.authBg}>
      <div style={S.authCard}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:52}}>🎓</div>
          <div style={{fontSize:22,fontWeight:900,color:"#2d3436",marginTop:8}}>KET 语法通关</div>
          <div style={{fontSize:13,color:"#636e72",marginTop:4}}>{isLogin?"登录账号开始学习":"注册新账号"}</div>
        </div>
        {error && <div style={S.errBox}>{error}</div>}
        <div style={S.fg}>
          <label style={S.lbl}>👤 用户名（仅限英文/数字）</label>
          <input style={S.inp} placeholder="英文/数字，至少3位" value={username}
            onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoCapitalize="none" />
        </div>
        {!isLogin && (
          <div style={S.fg}>
            <label style={S.lbl}>📝 姓名</label>
            <input style={S.inp} placeholder="真实姓名（显示用）" value={name} onChange={e=>setName(e.target.value)} />
          </div>
        )}
        <div style={S.fg}>
          <label style={S.lbl}>🔑 密码</label>
          <input style={S.inp} type="password" placeholder="至少4位" value={password}
            onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} />
        </div>
        {!isLogin && (
          <div style={S.fg}>
            <label style={S.lbl}>🎫 邀请码</label>
            <input style={S.inp} placeholder="请输入邀请码" value={inviteCode}
              onChange={e=>setInviteCode(e.target.value.toUpperCase())} autoCapitalize="characters" />
          </div>
        )}
        {!isLogin && (
          <div style={S.fg}>
            <label style={S.lbl}>📅 学习计划</label>
            <div style={{display:"flex",gap:8}}>
              {[10,20,30,60].map(d=>(
                <div key={d} onClick={()=>setPlanDays(d)} style={{flex:1,textAlign:"center",padding:"8px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,fontSize:13,background:planDays===d?"#667eea":"#f0f0f0",color:planDays===d?"#fff":"#444"}}>
                  {d}天
                </div>
              ))}
            </div>
          </div>
        )}
        <button style={{...S.authBtn,opacity:busy?0.7:1}} onClick={submit} disabled={busy}>
          {busy?"处理中…":isLogin?"登  录":"注  册"}
        </button>
        <div style={{textAlign:"center",marginTop:16,fontSize:13,color:"#636e72"}}>
          {isLogin
            ? <span>没有账号？<span style={S.lnk} onClick={()=>{setMode("register");setError("");}}>立即注册</span></span>
            : <span>已有账号？<span style={S.lnk} onClick={()=>{setMode("login");setError("");}}>返回登录</span></span>
          }
          {!isLogin && <div style={{marginTop:8,fontSize:11,color:"#aaa"}}>💡 没有邀请码？请联系管理员获取</div>}
        </div>
      </div>
    </div>
  );
}

                        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

                          <button style={{...S.actBtn,background:"#fff3cd"}} onClick={()=>doReset(un)}>🔄 重置进度</button>

                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={S.secTitle}>🛡 管理员</div>
              {admins.map(([un,u])=>(
                <div key={un} style={{...S.sCard,borderLeft:"4px solid #667eea"}}>
                  <div style={S.sHead}>
                    <div style={{...S.ava,background:"#667eea"}}>{(u.displayName||"A")[0].toUpperCase()}</div>
                    <div><div style={{fontWeight:700,fontSize:13}}>{u.displayName} <span style={{fontSize:10,color:"#667eea"}}>管理员</span></div><div style={{fontSize:11,color:"#aaa"}}>@{un}</div></div>
                  </div>
                </div>
              ))}
            </>
          )}

          {tab==="report" && (
            <>
              <div style={S.secTitle}>📈 详细学习报表</div>
              {students.length===0 && <div style={S.empty}><div style={{fontSize:36}}>📊</div><div>暂无学生数据</div></div>}
              {students.map(([un,u])=>{
                const tp=u.progress?.topicProgress||{};
                const learned=Object.values(tp).filter(p=>p.learned);
                const avgScore=learned.length?Math.round(learned.reduce((s,p)=>s+(p.quizScore||0),0)/learned.length*10)/10:0;
                const days=u.progress?.startDate?Math.floor((new Date()-new Date(u.progress.startDate))/86400000)+1:0;
                const pct=Math.round(learned.length/GRAMMAR_TOPICS.length*100);
                return(
                  <div key={un} style={S.repCard}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:15}}>{u.displayName}</div>
                        <div style={{fontSize:11,color:"#636e72"}}>@{un} · 第{days}天 · 计划{u.progress?.planDays||"?"}天</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:20,fontWeight:900,color:"#667eea"}}>{pct}%</div>
                        <div style={{fontSize:10,color:"#636e72"}}>完成度</div>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                      {[{label:"已学考点",val:`${learned.length}/${GRAMMAR_TOPICS.length}`},{label:"平均得分",val:`${avgScore}/10`},{label:"积分",val:u.progress?.xp||0}].map((x,i)=>(

                    <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>各考点（✓=已掌握）：</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {GRAMMAR_TOPICS.map(t=>{const p=tp[t.id];return(
                        <div key={t.id} title={t.title} style={{padding:"3px 7px",borderRadius:7,fontSize:10,fontWeight:600,background:p?.learned?t.color+"33":"#f0f0f0",border:`1px solid ${p?.learned?t.color+"66":"#e0e0e0"}`}}>

          {tab==="rank" && (

                {label:"🏆 完成度排行",fn:([,u])=>Math.round(Object.values(u.progress?.topicProgress||{}).filter(p=>p.learned).length/GRAMMAR_TOPICS.length*100),unit:"%"},
                {label:"⭐ 积分排行",fn:([,u])=>u.progress?.xp||0,unit:" XP"},
                {label:"📝 平均得分",fn:([,u])=>{const a=Object.values(u.progress?.topicProgress||{}).filter(p=>p.learned);return a.length?Math.round(a.reduce((s,p)=>s+(p.quizScore||0),0)/a.length*10)/10:0;},unit:"/10"},
              ].map(({label,fn,unit})=>(
                <div key={label}>
                  <div style={S.secTitle}>{label}</div>
                  {[...students].sort((a,b)=>fn(b)-fn(a)).map((entry,i)=>{
                    const [un,u]=entry;
                    return(
                      <div key={un} style={S.rankRow}>
                        <div style={{...S.rankNum,background:i===0?"#f9ca24":i===1?"#c0c0c0":i===2?"#cd7f32":"#f0f0f0"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                        <div style={{flex:1,fontWeight:600,fontSize:13}}>{u.displayName}</div>
                        <div style={{fontSize:14,fontWeight:800,color:"#667eea"}}>{fn(entry)}{unit}</div>
                      </div>

              ))}
            </>

          {tab==="codes" && (
            <>
              <div style={S.secTitle}>🔑 邀请码管理</div>
              <div style={{padding:"0 16px 16px"}}>

                  • 学生注册时必须填写正确邀请码<br/>
                  • 邀请码不区分大小写<br/>
                  • 删除邀请码后已注册学生不受影响<br/>

                </div>
                <div style={{fontSize:13,fontWeight:700,color:"#2d3436",marginBottom:10}}>当前有效邀请码（{(settings.inviteCodes||[]).length}个）</div>

                  <div key={code} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:12,padding:"12px 16px",marginBottom:8,boxShadow:"0 2px 6px rgba(0,0,0,0.05)",border:"2px solid #667eea22"}}>
                    <span style={{fontSize:18}}>🔑</span>
                    <span style={{flex:1,fontFamily:"'Courier New',monospace",fontSize:16,fontWeight:700,color:"#667eea",letterSpacing:2}}>{code}</span>
                    <button style={{...S.actBtn,background:"#f8d7da",color:"#721c24"}} onClick={()=>removeCode(code)}>删除</button>

                  <button style={{padding:"12px 20px",background:"#667eea",color:"#fff",border:"none",borderRadius:12,fontWeight:700,cursor:"pointer",fontSize:13}} onClick={addCode}>添加</button>

}

// STUDENT APP
// ═══════════════════════════════════════════════════════
function StudentApp({ user, onLogout }) {
  const [tab, setTab]       = useState("today");
  const [screen, setScreen] = useState("dash");
  const [selTopic, setSel]  = useState(null);
  const [quiz, setQuiz]     = useState(null);
  const [prog, setProg]     = useState(null);
  const today = new Date().toISOString().split("T")[0];

  useEffect(()=>{
    (async()=>{
      const u = await dbRead(`users/${user.username}`);
      if (u) setProg(u.progress || makeProgress(30));
    })();
  },[user.username]);

  const save = useCallback(async (newProg) => {
    setProg(newProg);
    await dbPatch(`users/${user.username}`, { progress: newProg, lastActive: today });
  },[user.username, today]);

  if (!prog) return <Splash text="加载学习进度…" />;

  const dayNum = Math.floor((new Date(today)-new Date(prog.startDate))/86400000)+1;
  const totalLearned = Object.values(prog.topicProgress).filter(p=>p.learned).length;
  const pct = Math.round(totalLearned/GRAMMAR_TOPICS.length*100);
  const todayTopics = GRAMMAR_TOPICS.filter(t=>t.day<=dayNum&&!prog.topicProgress[t.id]?.learned);
  const reviewTopics = GRAMMAR_TOPICS.filter(t=>{const p=prog.topicProgress[t.id];return p?.learned&&p?.nextReview&&p.nextReview<=today;});

  const openTopic = (t) => { setSel(t); setScreen("study"); };

  if (screen==="study"&&selTopic) return(
    <StudyScreen topic={selTopic} userName={user.displayName}
      onStartQuiz={()=>{setQuiz({topicId:selTopic.id,qIdx:0,score:0});setScreen("quiz");}}
      onBack={()=>setScreen("dash")} />
  );
  if (screen==="quiz"&&quiz) return(
    <QuizScreen topic={GRAMMAR_TOPICS.find(t=>t.id===quiz.topicId)}
      quiz={quiz} setQuiz={setQuiz} onBack={()=>setScreen("study")}
      onFinish={(score)=>{
        const nd=JSON.parse(JSON.stringify(prog));
        const p=nd.topicProgress[quiz.topicId];
        const passed=score>=6;
        p.learned=true;p.quizScore=score;p.reviewCount=(p.reviewCount||0)+1;p.lastReview=today;
        const ni=passed?Math.min((p.intervalIdx||0)+1,SR_INTERVALS.length-1):0;
        p.intervalIdx=ni;
        const nx=new Date();nx.setDate(nx.getDate()+(SR_INTERVALS[Math.max(ni-1,0)]||1));
        p.nextReview=nx.toISOString().split("T")[0];
        nd.xp=(nd.xp||0)+score*10;
        save(nd); setScreen("dash");
      }}
    />
  );

  const TABS=[{key:"today",label:"今日",icon:"📅"},{key:"library",label:"知识库",icon:"📚"},{key:"review",label:"复习",icon:"🔁"},{key:"progress",label:"进度",icon:"📊"}];

  return(
    <div style={S.app}>
      <div style={S.hdr}>
        <div>
          <div style={S.logo}>🎓 KET语法通关</div>
          <div style={S.sub}>你好 {user.displayName} · 第{dayNum}天</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={S.xpBadge}>⭐{prog.xp}</span>
          <button style={S.logoutBtn} onClick={onLogout}>退出</button>
        </div>
      </div>
      <div style={S.progBar}><div style={{...S.progFill,width:`${pct}%`}}/></div>
      <div style={{fontSize:11,color:"#636e72",textAlign:"center",padding:"4px 0",background:"#fff"}}>{pct}% · {totalLearned}/{GRAMMAR_TOPICS.length} 个考点</div>
      <div style={S.tabBar}>
        {TABS.map(t=>(
          <div key={t.key} style={{...S.tabItem,...(tab===t.key?S.tabOn:{})}} onClick={()=>setTab(t.key)}>
            <span style={{fontSize:16}}>{t.icon}</span>
            <span style={S.tabLbl}>{t.label}</span>
            {t.key==="review"&&reviewTopics.length>0&&<span style={S.badge}>{reviewTopics.length}</span>}
          </div>
        ))}
      </div>

      {tab==="today"&&(
        <div style={{paddingBottom:20}}>
          {reviewTopics.length>0&&<div style={S.rvBanner}><span>🔁 {reviewTopics.length}个待复习</span><button style={S.rvBtn} onClick={()=>setTab("review")}>去复习</button></div>}
          <div style={S.secTitle}>📅 今日任务（第{dayNum}天）</div>
          {todayTopics.length===0
            ?<div style={S.empty}><div style={{fontSize:44}}>🎉</div><div style={{fontWeight:700,fontSize:16}}>今日完成！</div><button style={{...S.rvBtn,marginTop:16,padding:"10px 24px"}} onClick={()=>setTab("library")}>去知识库</button></div>
            :<div style={S.tGrid}>{todayTopics.map(t=><TCard key={t.id} topic={t} progress={prog.topicProgress[t.id]} onClick={()=>openTopic(t)}/>)}</div>
          }
          {GRAMMAR_TOPICS.filter(t=>prog.topicProgress[t.id]?.lastReview===today&&prog.topicProgress[t.id]?.learned).length>0&&(
            <>
              <div style={S.secTitle}>✅ 今日已完成</div>
              <div style={S.tGrid}>{GRAMMAR_TOPICS.filter(t=>prog.topicProgress[t.id]?.lastReview===today&&prog.topicProgress[t.id]?.learned).map(t=><TCard key={t.id} topic={t} progress={prog.topicProgress[t.id]} learned onClick={()=>openTopic(t)}/>)}</div>
            </>
          )}
        </div>
      )}

      {tab==="library"&&(
        <div style={{paddingBottom:20}}>
          <div style={S.secTitle}>📚 全部知识库 · {GRAMMAR_TOPICS.length}个考点</div>
          {Object.entries(CATEGORY_MAP).map(([cat,ids])=>(
            <div key={cat}>
              <div style={S.catTitle}>{cat}</div>
              <div style={S.tGrid}>{ids.map(id=>{const topic=GRAMMAR_TOPICS.find(t=>t.id===id);if(!topic)return null;const p=prog.topicProgress[topic.id];const due=p?.learned&&p?.nextReview&&p.nextReview<=today;return<TCard key={topic.id} topic={topic} progress={p} learned={p?.learned} isDue={due} onClick={()=>openTopic(topic)}/>;})}</div>
            </div>
          ))}
        </div>
      )}

      {tab==="review"&&(
        <div style={{paddingBottom:20}}>
          <div style={S.secTitle}>🔁 艾宾浩斯复习队列</div>
          <div style={{padding:"0 16px 12px"}}>
            <div style={{background:"#fff",borderRadius:12,padding:14,border:"2px solid #667eea22"}}>
              <div style={{fontWeight:700,marginBottom:4,fontSize:12,color:"#667eea"}}>📌 复习间隔：1天→3天→7天→14天→30天</div>
              <div style={{fontSize:12,color:"#636e72"}}>答对6题以上才算掌握，自动安排下次复习</div>
            </div>
          </div>
          {reviewTopics.length>0
            ?<div style={S.tGrid}>{reviewTopics.map(t=><TCard key={t.id} topic={t} progress={prog.topicProgress[t.id]} learned isDue onClick={()=>openTopic(t)}/>)}</div>
            :<div style={S.empty}><div style={{fontSize:40}}>✨</div><div style={{fontWeight:700}}>今日无需复习</div></div>
          }
          {(()=>{
            const up=GRAMMAR_TOPICS.filter(t=>{const p=prog.topicProgress[t.id];return p?.learned&&p?.nextReview&&p.nextReview>today;}).sort((a,b)=>prog.topicProgress[a.id].nextReview.localeCompare(prog.topicProgress[b.id].nextReview));
            if(!up.length)return null;
            return(<><div style={S.secTitle}>📅 即将复习</div>{up.slice(0,8).map(t=>{const p=prog.topicProgress[t.id];const days=Math.ceil((new Date(p.nextReview)-new Date(today))/86400000);return(<div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 20px",background:"#fff",borderBottom:"1px solid #f5f5f5"}}><span style={{fontSize:18}}>{t.emoji}</span><span style={{flex:1,fontSize:12}}>{t.title}</span><span style={{fontSize:11,color:"#636e72",background:"#f0f0f0",padding:"2px 8px",borderRadius:20}}>{days}天后</span></div>);})}</>);
          })()}
        </div>
      )}

      {tab==="progress"&&(
        <div style={{paddingBottom:20}}>
          <div style={S.secTitle}>📊 我的进度</div>
          <div style={S.grid2}>
            {[{e:"📚",label:"已学考点",val:`${totalLearned}/${GRAMMAR_TOPICS.length}`},{e:"⭐",label:"累计积分",val:`${prog.xp} XP`},{e:"📅",label:"学习天数",val:`${dayNum}天`},{e:"🎯",label:"学习计划",val:`${prog.planDays}天`}].map((s,i)=>(
              <div key={i} style={S.statCard}><div style={{fontSize:26}}>{s.e}</div><div style={{fontSize:18,fontWeight:900,color:"#2d3436"}}>{s.val}</div><div style={{fontSize:11,color:"#636e72"}}>{s.label}</div></div>
            ))}
          </div>
          <div style={S.secTitle}>各考点掌握情况</div>
          {GRAMMAR_TOPICS.map(t=>{const p=prog.topicProgress[t.id];const pct2=p?.learned?Math.min(100,((p.intervalIdx||0)/SR_INTERVALS.length)*100):0;return(
            <div key={t.id} style={S.pRow}><span style={{fontSize:13}}>{t.emoji}</span><div style={S.pInfo}><div style={{fontSize:10,fontWeight:600,marginBottom:3}}>{t.title}</div><div style={S.pBar}><div style={{...S.pFill,width:`${pct2}%`,background:t.color}}/></div></div><span style={{fontSize:11,color:p?.learned?"#00b894":"#b2bec3",minWidth:38,textAlign:"right"}}>{p?.learned?`${p.quizScore}/10`:"未学"}</span></div>
          );})}
        </div>
      )}
    </div>
  );
}

// ── Shared Components ──────────────────────────────────
function TCard({topic,progress,learned,isDue,onClick}){
  return(
    <div style={{...S.tCard,borderLeft:`5px solid ${topic.color}`}} onClick={onClick}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <span style={{fontSize:22}}>{topic.emoji}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:"#2d3436"}}>{topic.title}</div>
          <div style={{fontSize:11,color:"#636e72"}}>
            {learned?`✅ 已掌握 · ${progress?.quizScore}/10分`:"🆕 待学习"}
            {isDue&&<span style={{background:"#ffc107",color:"#856404",padding:"1px 6px",borderRadius:10,fontSize:10,fontWeight:700,marginLeft:4}}>🔁复习</span>}
          </div>
        </div>
      </div>
      {learned&&<div style={{fontSize:12,letterSpacing:3,marginTop:3}}>{[0,1,2,3,4].map(i=><span key={i} style={{color:i<(progress?.intervalIdx||0)?topic.color:"#ddd"}}>●</span>)}</div>}
    </div>
  );
}

function StudyScreen({topic,onStartQuiz,onBack,userName}){
  const [ri,setRi]=useState(0);
  const rule=topic.rules[ri];
  return(
    <div style={S.sPage}>
      <div style={S.sHdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button style={S.backBtn} onClick={onBack}>← 返回</button>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>{userName}</span>
        </div>
        <h2 style={{color:"#fff",fontSize:14,fontWeight:900,margin:"8px 0 0"}}>{topic.emoji} {topic.title}</h2>
      </div>
      <div style={{display:"flex",gap:6,padding:"12px 20px 4px",justifyContent:"center",flexWrap:"wrap"}}>
        {topic.rules.map((_,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",cursor:"pointer",background:i===ri?topic.color:"#ddd"}} onClick={()=>setRi(i)}/>)}
      </div>
      <div style={{background:"#fff",margin:"8px 16px",borderRadius:14,padding:16,border:`2px solid ${topic.color}`,boxShadow:"0 4px 12px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:11,fontWeight:700,color:topic.color,marginBottom:4}}>📌 规则 {ri+1}/{topic.rules.length}</div>
        <div style={{fontSize:15,fontWeight:900,color:"#2d3436",marginBottom:12,lineHeight:1.6}}>{rule.rule}</div>
        <div style={{fontSize:11,fontWeight:700,color:"#636e72",marginBottom:5}}>💡 例子：</div>
        {rule.examples.map((ex,i)=><div key={i} style={{fontSize:12,color:"#2d3436",padding:"3px 0",borderBottom:"1px dashed #f0f0f0",fontFamily:"'Courier New',monospace"}}>• {ex}</div>)}
      </div>
      <div style={{display:"flex",padding:"12px 16px",gap:10}}>
        <button style={{flex:1,padding:"12px",borderRadius:12,border:"2px solid #e0e0e0",background:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,opacity:ri===0?0.3:1}} onClick={()=>setRi(Math.max(0,ri-1))}>← 上一条</button>
        {ri<topic.rules.length-1
          ?<button style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:topic.color,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}} onClick={()=>setRi(ri+1)}>下一条 →</button>
          :<button style={{...S.primBtn,margin:0,flex:1}} onClick={onStartQuiz}>开始练习（10题）✏️</button>
        }
      </div>
    </div>
  );
}

function QuizScreen({topic,quiz,setQuiz,onFinish,onBack}){
  const [sel,setSel]=useState(null);
  const [fb,setFb]=useState(false);
  const q=topic.quiz[quiz.qIdx];
  const ok=sel===q.answer;
  const lc=q.level===1?"#00b894":q.level===2?"#FFC300":"#FF6B6B";
  const ll=q.level===1?"⭐基础":q.level===2?"⭐⭐中等":"⭐⭐⭐难";
  const pick=(i)=>{if(fb)return;setSel(i);setFb(true);};
  const next=()=>{const ns=quiz.score+(ok?1:0);if(quiz.qIdx+1>=topic.quiz.length){onFinish(ns);}else{setQuiz({...quiz,qIdx:quiz.qIdx+1,score:ns});setSel(null);setFb(false);}};
  return(
    <div style={S.sPage}>
      <div style={S.sHdr}>
        <button style={S.backBtn} onClick={onBack}>← 返回</button>
        <h2 style={{color:"#fff",fontSize:14,fontWeight:900,margin:"8px 0 0"}}>{topic.emoji} 练习题</h2>
      </div>
      <div style={{padding:"12px 20px",fontSize:13,color:"#636e72"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span>第{quiz.qIdx+1}/{topic.quiz.length}题 · 得分：{quiz.score}</span>
          <span style={{color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:12,background:lc}}>{ll}</span>
        </div>
        <div style={{height:4,background:"#e0e0e0",borderRadius:4}}><div style={{height:"100%",borderRadius:4,background:topic.color,width:`${(quiz.qIdx/topic.quiz.length)*100}%`}}/></div>
      </div>
      <div style={{background:"#fff",margin:"8px 16px",borderRadius:14,padding:16,border:`2px solid ${topic.color}`,boxShadow:"0 4px 12px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:15,fontWeight:800,color:"#2d3436",marginBottom:14,lineHeight:1.5}}>{q.q}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {q.options.map((opt,i)=>{
            let bg="#f8f9fa",border="2px solid #e0e0e0";
            if(fb){if(i===q.answer){bg="#d4edda";border="2px solid #28a745";}else if(i===sel&&sel!==q.answer){bg="#f8d7da";border="2px solid #dc3545";}}
            else if(sel===i){bg="#e3f2fd";border=`2px solid ${topic.color}`;}
            return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,cursor:"pointer",fontSize:13,background:bg,border}} onClick={()=>pick(i)}>
                <span style={{width:26,height:26,borderRadius:"50%",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,flexShrink:0,background:topic.color}}>{["A","B","C","D"][i]}</span>
                <span style={{flex:1}}>{opt}</span>
                {fb&&i===q.answer&&<span style={{color:"#28a745",fontWeight:900}}>✓</span>}
                {fb&&i===sel&&sel!==q.answer&&<span style={{color:"#dc3545",fontWeight:900}}>✗</span>}
              </div>
            );
          })}
        </div>
        {fb&&<div style={{marginTop:12,padding:11,borderRadius:10,fontSize:13,fontWeight:700,textAlign:"center",background:ok?"#d4edda":"#fff3cd"}}>{ok?"🎉 正确！太棒了！":"💡 正确答案："+q.options[q.answer]}</div>}
      </div>
      {fb&&<button style={{...S.primBtn,background:topic.color,margin:"16px 16px 0"}} onClick={next}>{quiz.qIdx+1>=topic.quiz.length?"查看结果 🎊":"下一题 →"}</button>}
    </div>
  );
}
