<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词记忆卡片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #221f35;
    --accent: #e8c547;
    --accent2: #ff6b6b;
    --accent3: #6bcfff;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --border: rgba(255,255,255,0.08);
    --green: #4ecdc4;
    --red: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(232,197,71,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(107,207,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 80%, rgba(255,107,107,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    text-align: center;
    padding: 30px 0 20px;
  }

  header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  /* Unit selector */
  .unit-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 16px 0;
  }

  .unit-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
  }

  .unit-tab:hover { border-color: var(--accent); color: var(--accent); }
  .unit-tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .lesson-tab {
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 14px;
    border-color: rgba(107,207,255,0.2);
    color: var(--accent3);
  }
  .lesson-tab:hover { border-color: var(--accent3); color: var(--accent3); }
  .lesson-tab.active {
    background: var(--accent3);
    color: var(--bg);
    border-color: var(--accent3);
  }

  /* Mode selector */
  .mode-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin: 12px auto;
    width: fit-content;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 8px 18px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Progress bar */
  .progress-wrap {
    margin: 10px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 6px 0 16px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
  }

  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ===== FLASHCARD MODE ===== */
  #flashcard-mode {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .card-container {
    perspective: 1200px;
    width: 100%;
    max-width: 520px;
    height: 300px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
  }

  .card-front {
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .card-back {
    background: linear-gradient(135deg, #1e1b3a 0%, #0f1a2e 100%);
    border: 1px solid rgba(107,207,255,0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: rotateY(180deg);
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .card-word {
    font-family: 'Space Mono', monospace;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
    word-break: break-word;
  }

  .card-unit {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
  }

  .card-zh {
    font-size: 1.1rem;
    color: var(--accent);
    margin-top: 10px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .card-def {
    font-size: 1rem;
    color: var(--text);
    line-height: 1.7;
    font-weight: 300;
  }

  .card-hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .flip-icon {
    width: 16px; height: 16px;
    animation: spin 4s linear infinite;
    opacity: 0.5;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-wrong {
    background: rgba(255,107,107,0.15);
    color: var(--red);
    border: 1px solid rgba(255,107,107,0.3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.25); transform: translateY(-1px); }

  .btn-right {
    background: rgba(78,205,196,0.15);
    color: var(--green);
    border: 1px solid rgba(78,205,196,0.3);
  }
  .btn-right:hover { background: rgba(78,205,196,0.25); transform: translateY(-1px); }

  .btn-next {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
    border: none;
  }
  .btn-next:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  /* ===== QUIZ MODE ===== */
  #quiz-mode {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 10px 0;
  }

  .quiz-question {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    text-align: center;
  }

  .quiz-q-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .quiz-q-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 520px;
  }

  .quiz-opt {
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.4;
  }

  .quiz-opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,197,71,0.08);
  }

  .quiz-opt.correct {
    background: rgba(78,205,196,0.15);
    border-color: var(--green);
    color: var(--green);
  }

  .quiz-opt.wrong {
    background: rgba(255,107,107,0.15);
    border-color: var(--red);
    color: var(--red);
  }

  .quiz-feedback {
    font-size: 0.9rem;
    min-height: 28px;
    text-align: center;
    font-weight: 500;
  }

  /* ===== REVIEW MODE ===== */
  #review-mode {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }

  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    transition: all 0.2s;
  }

  .review-item:hover { border-color: rgba(232,197,71,0.3); }

  .review-word {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 700;
    min-width: 140px;
    line-height: 1.5;
  }

  .review-def {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.6;
    flex: 1;
  }

  .review-known {
    border-color: rgba(78,205,196,0.2);
    opacity: 0.6;
  }

  /* Complete screen */
  .complete-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
  }

  .complete-icon {
    font-size: 4rem;
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  .complete-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .complete-stats {
    display: flex;
    gap: 24px;
    margin: 10px 0;
  }

  .complete-stat {
    text-align: center;
  }

  .complete-stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
  }

  .complete-stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Shuffle badge */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    background: rgba(232,197,71,0.15);
    color: var(--accent);
    border: 1px solid rgba(232,197,71,0.3);
  }

  /* Hidden */
  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 480px) {
    .card-word { font-size: 1.6rem; }
    .quiz-options { grid-template-columns: 1fr; }
    header h1 { font-size: 1.5rem; }
    .review-item { flex-direction: column; gap: 6px; }
    .review-word { min-width: unset; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>📚 单词记忆卡</h1>
    <p id="subtitle">Grade 4 · Units 7–12</p>
  </header>

  <!-- Unit / Lesson filter -->
  <div class="unit-tabs" id="unit-tabs"></div>
  <div class="unit-tabs" id="lesson-tabs" style="margin-top:0;"></div>

  <!-- Mode selector -->
  <div class="mode-tabs">
    <button class="mode-btn active" onclick="switchMode('flashcard')">🃏 闪卡</button>
    <button class="mode-btn" onclick="switchMode('quiz')">🧠 测验</button>
    <button class="mode-btn" onclick="switchMode('review')">📖 速览</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-text" id="progress-text">0 / 0</span>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat">
      <div class="stat-dot" style="background:var(--green)"></div>
      <span id="stat-known">0 已掌握</span>
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--red)"></div>
      <span id="stat-unknown">0 待复习</span>
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--accent)"></div>
      <span id="stat-total">0 总计</span>
    </div>
    <div class="stat">
      <span style="cursor:pointer;color:var(--text-muted);font-size:0.75rem;text-decoration:underline" onclick="if(confirm('确定清除所有学习记录吗？'))clearKnown()">重置记录</span>
    </div>
  </div>

  <!-- FLASHCARD MODE -->
  <div id="flashcard-mode">
    <div class="card-container" id="card-container" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-front">
          <div class="card-label">DEFINITION</div>
          <div class="card-def" id="fc-def">—</div>
          <div class="card-hint">
            <svg class="flip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6M23 20v-6h-6"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
            点击翻转查看单词
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">WORD</div>
          <div class="card-word" id="fc-word">—</div>
          <div class="card-zh" id="fc-zh-back"></div>
          <div class="card-unit" id="fc-unit"></div>
        </div>
      </div>
    </div>
    <div class="action-row" id="fc-actions" style="display:none">
      <button class="btn btn-wrong" onclick="markCard(false)">✗ 没记住</button>
      <button class="btn btn-right" onclick="markCard(true)">✓ 已掌握</button>
    </div>
    <div class="action-row">
      <button class="btn btn-ghost" onclick="prevCard()">← 上一个</button>
      <button class="btn btn-next" onclick="nextCard()">下一个 →</button>
      <button class="btn btn-ghost" onclick="shuffleDeck()">⇄ 乱序</button>
    </div>
    <div class="complete-screen hidden" id="fc-complete">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">本轮完成！</div>
      <div class="complete-stats">
        <div class="complete-stat">
          <div class="complete-stat-num" style="color:var(--green)" id="cc-known">0</div>
          <div class="complete-stat-label">已掌握</div>
        </div>
        <div class="complete-stat">
          <div class="complete-stat-num" style="color:var(--red)" id="cc-unknown">0</div>
          <div class="complete-stat-label">待复习</div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="restartDeck()">重新开始</button>
        <button class="btn btn-next" onclick="reviewUnknown()">只练没记住的</button>
      </div>
    </div>
  </div>

  <!-- QUIZ MODE -->
  <div id="quiz-mode" class="hidden">
    <div class="quiz-question">
      <div class="quiz-q-label">请选出正确单词</div>
      <div class="quiz-q-text" id="qz-question">—</div>
    </div>
    <div class="quiz-options" id="qz-options"></div>
    <div class="quiz-feedback" id="qz-feedback"></div>
    <div class="action-row">
      <button class="btn btn-next hidden" id="qz-next-btn" onclick="nextQuiz()">下一题 →</button>
    </div>
    <div class="complete-screen hidden" id="quiz-complete">
      <div class="complete-icon">🏆</div>
      <div class="complete-title">测验完成！</div>
      <div class="complete-stats">
        <div class="complete-stat">
          <div class="complete-stat-num" style="color:var(--green)" id="qc-correct">0</div>
          <div class="complete-stat-label">答对</div>
        </div>
        <div class="complete-stat">
          <div class="complete-stat-num" style="color:var(--red)" id="qc-wrong">0</div>
          <div class="complete-stat-label">答错</div>
        </div>
        <div class="complete-stat">
          <div class="complete-stat-num" style="color:var(--accent)" id="qc-pct">0%</div>
          <div class="complete-stat-label">正确率</div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn btn-next" onclick="restartQuiz()">再来一次</button>
      </div>
    </div>
  </div>

  <!-- REVIEW MODE -->
  <div id="review-mode" class="hidden">
    <div id="review-list"></div>
  </div>
</div>

<script>
const ALL_WORDS = [
  // Unit 7 Lesson 1
  {word:"iguana",def:"a large tropical American lizard",zh:"鬣蜥（一种大型热带美洲蜥蜴）",unit:"Unit 7",lesson:"L1"},
  {word:"national park",def:"an area of land protected by the government for people to visit because of its natural beauty and historical or scientific interest",zh:"国家公园",unit:"Unit 7",lesson:"L1"},
  {word:"jungle",def:"an area of tropical forest where trees and plants grow very thickly",zh:"丛林；热带雨林",unit:"Unit 7",lesson:"L1"},
  {word:"sand",def:"the very tiny, loose pieces of rock that cover beaches, deserts, etc.",zh:"沙；沙子",unit:"Unit 7",lesson:"L1"},
  {word:"volcano",def:"a mountain with a hole in the top or side that sometimes sends out rocks, ash, lava, etc. in a sudden explosion",zh:"火山",unit:"Unit 7",lesson:"L1"},
  {word:"wildlife",def:"animals living in nature",zh:"野生动植物",unit:"Unit 7",lesson:"L1"},
  {word:"erupt",def:"to send out rocks, ash, lava, etc. in a sudden explosion",zh:"（火山）爆发；喷发",unit:"Unit 7",lesson:"L1"},
  {word:"branch",def:"a part of a tree that grows out from the trunk",zh:"树枝",unit:"Unit 7",lesson:"L1"},
  {word:"lay eggs",def:"to produce and put eggs outside the body, like birds do",zh:"产卵；下蛋",unit:"Unit 7",lesson:"L1"},
  {word:"leaf",def:"a flat green part of a plant, growing from a stem or branch or from the root",zh:"叶子；树叶",unit:"Unit 7",lesson:"L1"},
  {word:"nest",def:"the place where a bird lays its eggs and takes care of its young",zh:"巢；鸟巢",unit:"Unit 7",lesson:"L1"},
  {word:"soil",def:"the top layer of earth in which plants grow",zh:"土壤；泥土",unit:"Unit 7",lesson:"L1"},
  // Unit 7 Lesson 2
  {word:"humid",def:"(of the air or climate) warm and slightly wet",zh:"潮湿的；湿润的",unit:"Unit 7",lesson:"L2"},
  {word:"smell",def:"the quality of a thing that you can sense with your nose",zh:"气味；嗅觉",unit:"Unit 7",lesson:"L2"},
  {word:"creature",def:"a living thing, real or imaginary, that can move around, such as an animal",zh:"生物；动物",unit:"Unit 7",lesson:"L2"},

// ── localStorage helpers ──────────────────────────────────
const LS_KEY = 'vocab_known_v1';

function loadKnown() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function saveKnown() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify([...known]));
  } catch(e) {}
}

function clearKnown() {
  known.clear();
  unknown.clear();
  saveKnown();
  updateStats();
  renderReview();
}
// ─────────────────────────────────────────────────────────

// State
let currentUnit = 'all';
let currentLesson = 'all';
let currentMode = 'flashcard';
let deck = [];
let deckIndex = 0;
let known = loadKnown();
let unknown = new Set();
let isFlipped = false;

// Quiz state
let quizWords = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizWrong = 0;

// Filter
function getWords() {
  return ALL_WORDS.filter(w => {
    const unitMatch = currentUnit === 'all' || w.unit === currentUnit;
    const lessonMatch = currentLesson === 'all' || w.lesson === currentLesson;
    return unitMatch && lessonMatch;
  });
}

function buildUnitTabs() {
  const units = ['all','Unit 7','Unit 8','Unit 9','Unit 10','Unit 11','Unit 12'];
  const labels = {all:'全部','Unit 7':'U7','Unit 8':'U8','Unit 9':'U9','Unit 10':'U10','Unit 11':'U11','Unit 12':'U12'};
  document.getElementById('unit-tabs').innerHTML = units.map(u =>
    `<button class="unit-tab${u===currentUnit?' active':''}" onclick="selectUnit('${u}')">${labels[u]}</button>`
  ).join('');
}

function buildLessonTabs() {
  const container = document.getElementById('lesson-tabs');
  if (currentUnit === 'all') { container.innerHTML = ''; return; }
  const lessons = ['all','L1','L2','L3'];
  const uNum = currentUnit.replace('Unit ','');
  const labels = {all:'全部课', L1:`U${uNum}L1`, L2:`U${uNum}L2`, L3:`U${uNum}L3`};
  container.innerHTML = lessons.map(l =>
    `<button class="unit-tab${l===currentLesson?' active':''}${l!=='all'?' ':''}lesson-tab" onclick="selectLesson('${l}')">${labels[l]}</button>`
  ).join('');
}

function selectUnit(u) {
  currentUnit = u;
  currentLesson = 'all';
  buildUnitTabs();
  buildLessonTabs();
  resetAndShow();
}

function selectLesson(l) {
  currentLesson = l;
  buildLessonTabs();
  resetAndShow();
}

function resetAndShow() {
  initDeck();
  initQuiz();
  renderReview();
  if (currentMode === 'flashcard') showCard();
  else if (currentMode === 'quiz') showQuiz();
}

function initDeck(wordsOverride) {
  deck = wordsOverride || getWords();
  deckIndex = 0;
  unknown.clear();
  isFlipped = false;
  hideComplete();
  updateStats();
}

function initQuiz() {
  quizWords = shuffle([...getWords()]);
  quizIndex = 0; quizCorrect = 0; quizWrong = 0;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// FLASHCARD
function showCard() {
  if (deckIndex >= deck.length) { showComplete(); return; }
  const w = deck[deckIndex];
  document.getElementById('fc-word').textContent = w.word;
  document.getElementById('fc-unit').textContent = w.unit + ' · ' + w.lesson;
  document.getElementById('fc-def').textContent = w.def;
  document.getElementById('fc-zh-back').textContent = w.zh || '';
  // Reset flip
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('fc-actions').style.display = 'none';
  updateProgress();
}

function flipCard() {
  if (deckIndex >= deck.length) return;
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('fc-actions').style.display = 'flex';
  }
}

function markCard(isKnown) {
  const w = deck[deckIndex];
  if (isKnown) { known.add(w.word); unknown.delete(w.word); }
  else { unknown.add(w.word); known.delete(w.word); }
  saveKnown();
  updateStats();
  nextCard();
}

function nextCard() {
  deckIndex++;
  isFlipped = false;
  showCard();
}

function prevCard() {
  if (deckIndex > 0) { deckIndex--; showCard(); }
}

function shuffleDeck() {
  deck = shuffle([...getWords()]);
  deckIndex = 0; unknown.clear();
  isFlipped = false; hideComplete();
  updateStats(); showCard();
}

function restartDeck() {
  initDeck(); hideComplete(); showCard();
}

function reviewUnknown() {
  const uw = getWords().filter(w => unknown.has(w.word));
  if (uw.length === 0) { initDeck(); } else { initDeck(uw); }
  hideComplete(); showCard();
}

function showComplete() {
  document.getElementById('card-container').style.display = 'none';
  document.querySelectorAll('.btn-ghost, .btn-next').forEach(b => {
    if (!b.closest('#fc-complete')) b.style.display = 'none';
  });
  document.getElementById('fc-complete').classList.remove('hidden');
  document.getElementById('cc-known').textContent = known.size;
  document.getElementById('cc-unknown').textContent = unknown.size;
}

function hideComplete() {
  document.getElementById('card-container').style.display = '';
  document.querySelectorAll('.btn-ghost, .btn-next').forEach(b => {
    if (!b.closest('#fc-complete')) b.style.display = '';
  });
  document.getElementById('fc-complete').classList.add('hidden');
}

function updateProgress() {
  const total = deck.length;
  const pct = total ? (deckIndex / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${deckIndex} / ${total}`;
}

function updateStats() {
  const total = getWords().length;
  document.getElementById('stat-known').textContent = `${known.size} 已掌握`;
  document.getElementById('stat-unknown').textContent = `${unknown.size} 待复习`;
  document.getElementById('stat-total').textContent = `${total} 总计`;
  updateProgress();
}

// QUIZ
function showQuiz() {
  if (quizIndex >= quizWords.length) { showQuizComplete(); return; }
  document.getElementById('quiz-complete').classList.add('hidden');
  document.querySelector('#quiz-mode .quiz-question').style.display = '';
  document.getElementById('qz-options').style.display = '';

  const w = quizWords[quizIndex];
  document.getElementById('qz-question').textContent = w.def;
  document.getElementById('qz-feedback').textContent = '';
  document.getElementById('qz-next-btn').classList.add('hidden');

  // Build 4 options
  const allW = getWords();
  let opts = [w];
  const others = shuffle(allW.filter(x => x.word !== w.word));
  opts = opts.concat(others.slice(0, 3));
  opts = shuffle(opts);

  const container = document.getElementById('qz-options');
  container.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = o.word;
    btn.onclick = () => checkQuiz(btn, o.word, w.word);
    container.appendChild(btn);
  });

  updateProgress();
}

function checkQuiz(btn, chosen, correct) {
  document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('qz-feedback').style.color = 'var(--green)';
    document.getElementById('qz-feedback').textContent = '✓ 正确！';
    quizCorrect++;
  } else {
    btn.classList.add('wrong');
    document.getElementById('qz-feedback').style.color = 'var(--red)';
    document.getElementById('qz-feedback').textContent = `✗ 正确答案是：${correct}`;
    quizWrong++;
    document.querySelectorAll('.quiz-opt').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }
  document.getElementById('qz-next-btn').classList.remove('hidden');
  quizIndex++;
}

function nextQuiz() { showQuiz(); }

function showQuizComplete() {
  document.querySelector('#quiz-mode .quiz-question').style.display = 'none';
  document.getElementById('qz-options').style.display = 'none';
  document.getElementById('qz-feedback').textContent = '';
  document.getElementById('qz-next-btn').classList.add('hidden');
  document.getElementById('quiz-complete').classList.remove('hidden');
  const total = quizCorrect + quizWrong;
  document.getElementById('qc-correct').textContent = quizCorrect;
  document.getElementById('qc-wrong').textContent = quizWrong;
  document.getElementById('qc-pct').textContent = total ? Math.round(quizCorrect/total*100) + '%' : '0%';
}

function restartQuiz() {
  initQuiz();
  document.getElementById('quiz-complete').classList.add('hidden');
  document.querySelector('#quiz-mode .quiz-question').style.display = '';
  document.getElementById('qz-options').style.display = '';
  showQuiz();
}

// REVIEW
function renderReview() {
  const words = getWords();
  const list = document.getElementById('review-list');
  list.innerHTML = words.map(w => `
    <div class="review-item ${known.has(w.word) ? 'review-known' : ''}">
      <div class="review-word">${w.word}</div>
      <div style="flex:1">
        <div class="review-def">${w.def}</div>
        ${w.zh ? `<div style="font-size:0.82rem;color:var(--accent);margin-top:3px;font-family:'Noto Sans SC',sans-serif">${w.zh}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// Mode switching
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', ['flashcard','quiz','review'][i] === mode);
  });
  document.getElementById('flashcard-mode').classList.toggle('hidden', mode !== 'flashcard');
  document.getElementById('quiz-mode').classList.toggle('hidden', mode !== 'quiz');
  document.getElementById('review-mode').classList.toggle('hidden', mode !== 'review');
  document.getElementById('progress-wrap').classList.toggle('hidden', mode === 'review');
  document.getElementById('stats-row').classList.toggle('hidden', mode === 'review');

  if (mode === 'flashcard') showCard();
  else if (mode === 'quiz') { initQuiz(); showQuiz(); }
  else if (mode === 'review') renderReview();
}

// Bootstrap
buildUnitTabs();
buildLessonTabs();
initDeck();
initQuiz();
showCard();
</script>
</body>
